    h('span',{className:'dqr-txt',style:{fontSize:(size<40?10:size<56?12:14)+'px',color:dqColor(score)}},Math.round(score))

}

// ── STATE ──
const state={
  tab:'exceptions', // exceptions | monitoring | analytics
  view:'table',
  sort:{col:'sev',dir:'desc'},
  filters:{search:'',sev:'all',status:'all',fund:'all',dim:'all',rule:'all'},
  detail:null,
  jiraModal:null,
  expandedRules:{}
};

// ── Severity order for sorting ──
const sevOrder={critical:4,high:3,medium:2,low:1};

// ── RENDER ──
function render(){
  const app=$('#app');app.innerHTML='';
  app.appendChild(renderHeader());
  const main=h('div',{className:'main'});
  main.appendChild(renderStats());
  main.appendChild(renderTabs());
  if(state.tab==='exceptions'){
    main.appendChild(renderFilters());
    if(state.view==='table') main.appendChild(renderTable());
    else main.appendChild(renderBoard());
  } else if(state.tab==='monitoring'){
    main.appendChild(renderMonitoring());
  } else {
    main.appendChild(renderAnalytics());
  }
  app.appendChild(main);
  if(state.detail!=null) app.appendChild(renderDetail(state.detail));
  if(state.jiraModal!=null) app.appendChild(renderJiraModal(state.jiraModal));
}

function renderHeader(){
  return h('header',{className:'header'},
    h('div',{className:'header-inner'},
      h('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},
        h('div',{className:'logo'},'DQ'),
        h('div',null,
          h('div',{style:{fontWeight:700,fontSize:'15px'}},'JPMorgan Custody Holdings'),
          h('div',{style:{color:'var(--text3)',fontSize:'12px'}},S.reportDate+' · Daily · Settled Basis')
        )
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}},
        h('span',{className:'badge badge-src'},h('span',{className:'live-dot'}),'JPMC Custody'),
        h('span',{className:'badge badge-dq'},h('span',{className:'live-dot'}),'DQ Engine'),
        h('div',{className:'sep'}),
        h('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',color:'var(--text3)'}},
          fmt(S.totalRecords)+' positions · '+fmt(S.totalColumns)+' fields · '+S.currencies.join(', ')
        )
      )
    )
  )
}

function renderStats(){
  const exc=EXCEPTIONS;
  const open=exc.filter(e=>e.status==='Open').length;
  const high=exc.filter(e=>e.sev==='high'||e.sev==='critical').length;
  const esc=exc.filter(e=>e.status==='Escalated').length;
  const jira=exc.filter(e=>e.jira).length;
  const unassigned=exc.filter(e=>!e.assignee).length;
  const bondExc=exc.filter(e=>e.rule==='CR-001').length;
  const qtyExc=exc.filter(e=>e.rule==='CR-004').length;
  const cards=[
    ['Total',exc.length,'var(--text)','📋'],
    ['Open',open,'var(--red)','🔓'],
    ['High / Critical',high,'var(--amber)','⚠️'],
    ['Escalated',esc,'var(--fuchsia)','🔺'],
    ['JIRA Linked',jira,'var(--blue)','🔗','of '+exc.length],
    ['Unassigned',unassigned,'var(--orange)','👤'],
    ['Bond MV (CR-001)',bondExc,'var(--amber)','📐'],
    ['Qty Balance (CR-004)',qtyExc,'var(--teal)','⚖️']
  ];
  const grid=h('div',{className:'stats'});
  cards.forEach(([lbl,val,col,ico,sub])=>{
    grid.appendChild(h('div',{className:'st'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'start'}},
        h('div',null,
          h('div',{className:'st-lbl'},lbl),
          h('div',{className:'st-val',style:{color:col}},fmt(val))
        ),
        h('span',{style:{fontSize:'18px'}},ico)
      ),
      sub?h('div',{className:'st-sub'},sub):null
    ))
  });
  return grid
}

function renderTabs(){
  const wrap=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px',marginBottom:'20px'}});
  const tabs=h('div',{className:'tabs'});
  ['exceptions','monitoring','analytics'].forEach(t=>{
    const lbl=t==='exceptions'?'Exceptions ('+EXCEPTIONS.length+')':t==='monitoring'?'DQ Monitoring':'Analytics';
    tabs.appendChild(h('button',{className:state.tab===t?'active':'',onClick:()=>{state.tab=t;render()}},lbl))
  });
  wrap.appendChild(tabs);
  if(state.tab==='exceptions'){
    const vt=h('div',{style:{display:'flex',gap:'6px'}});
    ['table','board'].forEach(v=>{
      vt.appendChild(h('button',{className:'btn btn-sm'+(state.view===v?' btn-teal':''),onClick:()=>{state.view=v;render()}},v==='table'?'☰ Table':'▦ Board'))
    });
    wrap.appendChild(vt)
  }
  return wrap
}

function getFiltered(){
  let data=[...EXCEPTIONS];
  const f=state.filters;
  if(f.search){const q=f.search.toLowerCase();data=data.filter(e=>e.title.toLowerCase().includes(q)||e.isin.toLowerCase().includes(q)||e.id.toLowerCase().includes(q)||e.fund.toLowerCase().includes(q))}
  if(f.sev!=='all') data=data.filter(e=>e.sev===f.sev);
  if(f.status!=='all') data=data.filter(e=>e.status===f.status);
  if(f.fund!=='all') data=data.filter(e=>e.fund===f.fund);
  if(f.rule!=='all') data=data.filter(e=>e.rule===f.rule);
  const s=state.sort;
  data.sort((a,b)=>{
    let va,vb;
    if(s.col==='sev'){va=sevOrder[a.sev]||0;vb=sevOrder[b.sev]||0}
    else if(s.col==='updated'){va=a.updated;vb=b.updated}
    else if(s.col==='fund'){va=a.fund;vb=b.fund}
    else if(s.col==='rule'){va=a.rule;vb=b.rule}
    else{va=a[s.col];vb=b[s.col]}
    if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0
  });
  return data
}

function renderFilters(){
  const bar=h('div',{className:'fbar'});
  const inp=h('input',{className:'finp',type:'text',placeholder:'Search exceptions, ISIN, fund…',value:state.filters.search});
  inp.addEventListener('input',e=>{state.filters.search=e.target.value;render()});
  bar.appendChild(inp);

  const mkSel=(label,key,opts)=>{
    const sel=h('select',{className:'fsel'});
    sel.appendChild(h('option',{value:'all'},label+': All'));
    opts.forEach(([v,l])=>sel.appendChild(h('option',{value:v},l)));
    sel.value=state.filters[key];
    sel.addEventListener('change',e=>{state.filters[key]=e.target.value;render()});
    return sel
  };
  bar.appendChild(mkSel('Severity','sev',[['high','High'],['medium','Medium'],['low','Low']]));
  bar.appendChild(mkSel('Status','status',[['Open','Open'],['InProgress','In Progress'],['Escalated','Escalated'],['Resolved','Resolved']]));
  bar.appendChild(mkSel('Fund','fund',FUNDS.map(f=>[f.name,f.name])));
  bar.appendChild(mkSel('Rule','rule',[['CR-001','CR-001: MV = Qty × Price'],['CR-004','CR-004: Qty Balance']]));

  const cnt=h('div',{style:{marginLeft:'auto',fontSize:'12px',color:'var(--text3)'}},getFiltered().length+' of '+EXCEPTIONS.length+' exceptions');
  bar.appendChild(cnt);
  return bar
}

function sortBy(col){
  if(state.sort.col===col) state.sort.dir=state.sort.dir==='desc'?'asc':'desc';
  else{state.sort={col,dir:'desc'}}
  render()
}

function renderTable(){
  const data=getFiltered();
  const wrap=h('div',{className:'twrap'});
  const tbl=h('table');
  const arrow=col=>state.sort.col===col?(state.sort.dir==='desc'?' ↓':' ↑'):'';
  const thead=h('thead',null,h('tr',null,
    h('th',{style:{width:'90px'}},'ID'),
    h('th',{className:'sort',onClick:()=>sortBy('sev')},'Severity'+arrow('sev')),
    h('th',null,'Exception'),
    h('th',null,'ISIN'),
    h('th',{className:'sort',onClick:()=>sortBy('fund')},'Fund'+arrow('fund')),
    h('th',{className:'sort',onClick:()=>sortBy('rule')},'Rule'+arrow('rule')),
    h('th',null,'Status'),
    h('th',null,'Assignee'),
    h('th',null,'JIRA'),
    h('th',{className:'sort',onClick:()=>sortBy('updated')},'Updated'+arrow('updated'))
  ));
  tbl.appendChild(thead);
  const tbody=h('tbody');
  data.forEach(e=>{
    const tr=h('tr',{onClick:()=>{state.detail=e;render()}},
      h('td',null,h('span',{className:'mono',style:{color:'var(--teal)'}},e.id)),
      h('td',null,h('span',{className:'sev sev-'+e.sev},e.sev)),
      h('td',{style:{maxWidth:'280px'}},
        h('div',{style:{fontWeight:500,color:'#fff',fontSize:'13px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},e.title),
        h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},e.secType+' · '+e.subtype)
      ),
      h('td',null,h('span',{className:'mono',style:{fontSize:'11px'}},e.isin)),
      h('td',{style:{fontSize:'12px'}},e.fund.replace('Alpine ','A.').replace('Helvetia ','H.')),
      h('td',null,h('span',{className:'mono',style:{fontSize:'11px',color:'var(--indigo)'}},e.rule)),
      h('td',null,h('span',{className:'sts sts-'+e.status},e.status==='InProgress'?'In Progress':e.status)),
      h('td',{style:{fontSize:'12px',color:e.assignee?'var(--text)':'var(--text3)'}},e.assignee||'—'),
      h('td',null,e.jira?h('span',{className:'mono',style:{fontSize:'11px',color:'var(--blue)'}},e.jira):h('span',{style:{color:'var(--text3)'}},'—')),
      h('td',{style:{fontSize:'12px',color:'var(--text3)',whiteSpace:'nowrap'}},e.updated.replace(NOW,'').replace('Z',''))
    );
    tbody.appendChild(tr)
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  return wrap
}

function renderBoard(){
  const data=getFiltered();
  const cols=['Open','InProgress','Escalated','Resolved'];
  const labels={Open:'Open',InProgress:'In Progress',Escalated:'Escalated',Resolved:'Resolved'};
  const colors={Open:'var(--red)',InProgress:'var(--amber)',Escalated:'var(--fuchsia)',Resolved:'var(--emerald)'};
  const grid=h('div',{className:'board'});
  cols.forEach(st=>{
    const items=data.filter(e=>e.status===st);
    const col=h('div',{className:'board-col'},
      h('div',{className:'board-hdr'},
        h('span',{style:{fontWeight:600,fontSize:'13px',color:colors[st]}},labels[st]),
        h('span',{className:'board-cnt'},items.length)
      ),
      h('div',{className:'board-body'},
        ...items.map(e=>h('div',{className:'bcard',onClick:()=>{state.detail=e;render()}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:'6px'}},
            h('span',{className:'mono',style:{fontSize:'11px',color:'var(--teal)'}},e.id),
            h('span',{className:'sev sev-'+e.sev},e.sev)
          ),
          h('div',{style:{fontWeight:500,fontSize:'12px',color:'#fff',marginBottom:'4px'}},e.title.substring(0,50)+'…'),
          h('div',{style:{fontSize:'11px',color:'var(--text3)'}},e.fund.split(' ').slice(-2).join(' ')+' · '+e.isin)
        ))
      )
    );
    grid.appendChild(col)
  });
  return grid
}

function renderDetail(exc){
  const bg=h('div',{className:'so-bg'});
  bg.appendChild(h('div',{className:'so-dim',onClick:()=>{state.detail=null;render()}}));
  const so=h('div',{className:'so'});

  // Header
  const head=h('div',{className:'so-head'},
    h('div',{style:{display:'flex',alignItems:'start',justifyContent:'space-between'}},
      h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}},
          h('span',{className:'mono',style:{color:'var(--teal)',fontSize:'14px',fontWeight:600}},exc.id),
          h('span',{className:'sev sev-'+exc.sev},exc.sev),
          h('span',{className:'sts sts-'+exc.status},exc.status==='InProgress'?'In Progress':exc.status)
        ),
        h('div',{style:{fontWeight:600,fontSize:'14px',color:'#fff'}},exc.title)
      ),
      h('button',{className:'btn btn-sm',onClick:()=>{state.detail=null;render()}},'✕')
    )
  );
  so.appendChild(head);

  const body=h('div',{className:'so-body'});

  // Metadata grid
  const grid=h('div',{className:'mg'});
  [['ISIN',exc.isin],['Fund',exc.fund],['Security Type',exc.secType+' / '+exc.subtype],['Currency',exc.ccy],
   ['DQ Rule',exc.rule],['DQ Dimension',exc.dim],['Assignee',exc.assignee||'Unassigned'],['JIRA',exc.jira||'Not linked']
  ].forEach(([l,v])=>{
    grid.appendChild(h('div',null,h('div',{className:'ml'},l),h('div',{className:'mv'},v)))
  });
  body.appendChild(grid);

  // Detail description
  const dcard=h('div',{className:'detail-card'});
  dcard.appendChild(h('h3',null,'Exception Detail'));
  dcard.appendChild(h('div',{style:{fontSize:'13px',lineHeight:'1.6',color:'var(--text2)'}},exc.detail));

  // For bond MV exceptions, show calculation
  if(exc.rule==='CR-001'&&exc.mvLocal!=null){
    const calcBox=h('div',{style:{marginTop:'14px',background:'rgba(15,23,42,.5)',border:'1px solid var(--border2)',borderRadius:'8px',padding:'14px'}});
    calcBox.appendChild(h('div',{style:{fontSize:'11px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:'var(--text3)',marginBottom:'8px'}},'Calculation Breakdown'));
    const rows=[
      ['Face Value / Qty',fmt(exc.qty)],
      ['Clean Price (per 100)',exc.price?.toFixed(6)],
      ['Expected (Qty × Price)',fmtUSD(Math.round(exc.mvExpected))],
      ['Actual MV Local',fmtUSD(Math.round(exc.mvLocal))],
      ['Correct MV (Qty × Price ÷ 100)',fmtUSD(Math.round(exc.qty*exc.price/100))],
      ['Deviation',exc.diffPct+'%']
    ];
    rows.forEach(([k,v])=>{
      calcBox.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:'12px'}},
        h('span',{style:{color:'var(--text3)'}},k),
        h('span',{className:'mono',style:{color:k==='Deviation'?'var(--amber)':'#fff'}},v)
      ))
    });
    // Verdict
    const correctMV=Math.round(exc.qty*exc.price/100);
    const matchesActual=Math.abs(correctMV-Math.round(exc.mvLocal))<2;
    calcBox.appendChild(h('div',{style:{marginTop:'8px',padding:'8px 10px',background:matchesActual?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)',border:'1px solid '+(matchesActual?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'),borderRadius:'6px',fontSize:'12px',color:matchesActual?'var(--emerald)':'var(--red)'}},
      matchesActual?'✓ Actual MV matches bond convention (face × price ÷ 100). Rule CR-001 needs bond-aware logic.':'✗ MV does not match either convention. Manual review required.'
    ));
    dcard.appendChild(calcBox)
  }

  // Qty balance detail
  if(exc.rule==='CR-004'&&exc.settled!=null){
    const calcBox=h('div',{style:{marginTop:'14px',background:'rgba(15,23,42,.5)',border:'1px solid var(--border2)',borderRadius:'8px',padding:'14px'}});
    calcBox.appendChild(h('div',{style:{fontSize:'11px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:'var(--text3)',marginBottom:'8px'}},'Quantity Breakdown'));
    [['Settled Qty',fmt(exc.settled)],['Available Qty',fmt(exc.available)],['Pledged','0'],['On Loan','0'],['Unaccounted Difference',fmt(exc.diff)+' shares']].forEach(([k,v])=>{
      calcBox.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:'12px'}},
        h('span',{style:{color:'var(--text3)'}},k),
        h('span',{className:'mono',style:{color:k.includes('Difference')?'var(--amber)':'#fff'}},v)
      ))
    });
    dcard.appendChild(calcBox)
  }
  body.appendChild(dcard);

  // Actions
  const actions=h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
  const statuses=['Open','InProgress','Escalated','Resolved','Closed'];
  const statusSel=h('select',{className:'fsel',style:{flex:'1'}});
  statuses.forEach(s=>statusSel.appendChild(h('option',{value:s},s==='InProgress'?'In Progress':s)));
  statusSel.value=exc.status;
  statusSel.addEventListener('change',e=>{exc.status=e.target.value;exc.updated=new Date().toISOString();render()});
  actions.appendChild(statusSel);
  actions.appendChild(h('button',{className:'btn btn-blue',onClick:()=>{state.detail=null;state.jiraModal=exc;render()}},'🔗 Create JIRA'));
  body.appendChild(actions);

  // Comments
  const cmtSection=h('div');
  cmtSection.appendChild(h('div',{style:{fontSize:'13px',fontWeight:600,color:'#fff',marginBottom:'12px'}},'Activity ('+exc.comments.length+')'));
  exc.comments.forEach(c=>{
    const isAI=c.user==='DQ Engine';
    cmtSection.appendChild(h('div',{className:'cmt'},
      h('div',{className:'cmt-av',style:{background:isAI?'rgba(139,92,246,.2)':'rgba(59,130,246,.2)',color:isAI?'var(--indigo)':'var(--blue)'}},isAI?'AI':c.user[0]),
      h('div',{style:{flex:1}},
        h('div',{style:{display:'flex',gap:'8px',alignItems:'baseline',marginBottom:'4px'}},
          h('span',{style:{fontWeight:600,fontSize:'12px'}},c.user),
          h('span',{style:{fontSize:'11px',color:'var(--text3)'}},c.time)
        ),
        h('div',{style:{fontSize:'13px',color:'var(--text2)',lineHeight:'1.5'}},c.text)
      )
    ))
  });
  // Add comment
  const cmtBox=h('div',{style:{display:'flex',gap:'8px'}});
  const cmtInp=h('input',{className:'finp',style:{flex:1,width:'auto'},placeholder:'Add a comment…'});
  cmtBox.appendChild(cmtInp);
  cmtBox.appendChild(h('button',{className:'btn btn-teal',onClick:()=>{
    const v=cmtInp.value.trim();if(!v)return;
    exc.comments.push({user:'You',time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),text:v});
    exc.updated=new Date().toISOString();render()
  }},'Send'));
  cmtSection.appendChild(cmtBox);
  body.appendChild(cmtSection);

  so.appendChild(body);
  bg.appendChild(so);
  return bg
}

function renderJiraModal(exc){
  const bg=h('div',{className:'modal-bg'});
  bg.appendChild(h('div',{className:'modal-dim',onClick:()=>{state.jiraModal=null;render()}}));
  const modal=h('div',{className:'modal'});
  modal.appendChild(h('div',{className:'modal-head'},
    h('div',{style:{fontWeight:600,fontSize:'15px'}},'Create JIRA Ticket'),
    h('button',{className:'btn btn-sm',onClick:()=>{state.jiraModal=null;render()}},'✕')
  ));
  const body=h('div',{className:'modal-body'});
  const fields=[
    ['Project','RECON'],
    ['Issue Type','Bug'],
    ['Summary','[DQ] '+exc.title],
    ['Priority',exc.sev==='high'||exc.sev==='critical'?'High':'Medium'],
    ['Labels','dq-exception, custody, '+exc.dim.toLowerCase()],
    ['Component','JPMorgan Custody'],
    ['DQ Rule',exc.rule+' ('+exc.dim+')']
  ];
  fields.forEach(([lbl,val])=>{
    const fld=h('div',{className:'fld'});
    fld.appendChild(h('label',null,lbl));
    fld.appendChild(h('input',{type:'text',value:val,readOnly:true}));
    body.appendChild(fld)
  });
  const descFld=h('div',{className:'fld'});
  descFld.appendChild(h('label',null,'Description'));
  descFld.appendChild(h('textarea',null,
    'DQ Exception '+exc.id+' — '+exc.fund+'\n\n'+
    'ISIN: '+exc.isin+'\nSecurity: '+exc.title.replace(/^Bond MV mismatch: |^Qty balance: /,'')+'\n\n'+
    exc.detail
  ));
  body.appendChild(descFld);

  // DQ Rule Traceability
  const trace=h('div',{className:'detail-card'});
  trace.appendChild(h('h3',null,'DQ Rule Traceability'));
  [['Exception ID',exc.id],['DQ Rule',exc.rule],['DQ Dimension',exc.dim],['Data Source','JPMC Custody Holdings'],['Report Date',S.reportDate]].forEach(([k,v])=>{
    trace.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:'12px'}},
      h('span',{style:{color:'var(--text3)'}},k),h('span',{style:{color:'#fff'}},v)
    ))
  });
  body.appendChild(trace);
  modal.appendChild(body);
  modal.appendChild(h('div',{className:'modal-foot'},
    h('button',{className:'btn',onClick:()=>{state.jiraModal=null;render()}},'Cancel'),
    h('button',{className:'btn btn-blue',onClick:()=>{
      const ticket='RECON-'+(1044+Math.floor(Math.random()*50));
      exc.jira=ticket;
      exc.comments.push({user:'JIRA',time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),text:'Ticket '+ticket+' created and linked.'});
      state.jiraModal=null;render()
    }},'Create Ticket')
  ));
  bg.appendChild(modal);
  return bg
}

// ── MONITORING TAB ──
function renderMonitoring(){
  const wrap=h('div');

  // Overall DQ Score header
  const scoreHdr=h('div',{style:{display:'flex',alignItems:'center',gap:'24px',marginBottom:'24px',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:'14px',padding:'24px'}});
  scoreHdr.appendChild(ring2(DQ.overall,80,6));
  const scoreInfo=h('div');
  scoreInfo.appendChild(h('div',{style:{fontSize:'20px',fontWeight:700,color:'#fff'}},'Overall DQ Score: '+DQ.overall.toFixed(1)+'%'));
  scoreInfo.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text2)',marginTop:'4px'}},
    S.totalRecords+' positions · '+S.totalColumns+' fields · '+EXCEPTIONS.length+' exceptions detected'
  ));
  scoreInfo.appendChild(h('div',{style:{fontSize:'12px',color:'var(--text3)',marginTop:'4px'}},
    'Report: '+S.reportDate+' · Custodian: '+S.custodian+' · Basis: '+S.basis
  ));
  scoreHdr.appendChild(scoreInfo);
  wrap.appendChild(scoreHdr);

  // Dimension scores
  const dims=[
    {name:'Completeness',score:DQ.completeness,icon:'📊',desc:'All 63 fields populated (FI-only fields scoped to Fixed Income rows)'},
    {name:'Validity',score:DQ.validity,icon:'✓',desc:'ISIN, dates, currencies, quantities, prices all pass format checks'},
    {name:'Consistency',score:DQ.consistency,icon:'⚙️',desc:'14 bond MV mismatches (pricing convention), 3 qty balance breaks'},
    {name:'Uniqueness',score:DQ.uniqueness,icon:'🔑',desc:'No duplicate report IDs, position keys, or tax lot IDs'},
    {name:'Timeliness',score:DQ.timeliness,icon:'⏱',desc:'All price dates and report dates match position date'}
  ];
  const dimGrid=h('div',{className:'dim-grid'});
  dims.forEach(d=>{
    const card=h('div',{className:'dim-card'});
    card.appendChild(ring2(d.score,56,4));
    card.appendChild(h('div',{style:{fontWeight:600,fontSize:'12px',marginTop:'8px',color:'#fff'}},d.name));
    card.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px',lineHeight:'1.4'}},d.desc));
    const bar=h('div',{className:'dim-bar'});
    bar.appendChild(h('div',{className:'dim-fill',style:{width:d.score+'%',background:dqColor(d.score)}}));
    card.appendChild(bar);
    dimGrid.appendChild(card)
  });
  wrap.appendChild(dimGrid);

  // Fund breakdown
  const fundPanel=h('div',{className:'fund-panel'});
  fundPanel.appendChild(h('div',{className:'fund-hd'},
    h('div',{style:{fontWeight:600,fontSize:'14px',color:'#fff'}},'Portfolio Breakdown'),
    h('div',{style:{fontSize:'12px',color:'var(--text3)',marginTop:'2px'}},'5 sub-accounts across 2 master accounts · Total AUM '+fmtUSD(Math.round(S.totalMvUSD)))
  ));
  FUNDS.forEach(f=>{
    const excCount=EXCEPTIONS.filter(e=>e.fund===f.name).length;
    const row=h('div',{className:'fund-row'},
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:600,fontSize:'13px',color:'#fff'}},f.name),
        h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},f.id+' · '+f.ccy+' · '+f.isin)
      ),
      h('div',{style:{textAlign:'center',minWidth:'60px'}},
        h('div',{style:{fontSize:'16px',fontWeight:700,color:'var(--text)'}},f.positions),
        h('div',{style:{fontSize:'10px',color:'var(--text3)'}},'positions')
      ),
      h('div',{style:{textAlign:'center',minWidth:'80px'}},
        h('div',{style:{fontSize:'14px',fontWeight:600,color:'var(--teal)'}},fmtUSD(Math.round(f.mvUSD))),
        h('div',{style:{fontSize:'10px',color:'var(--text3)'}},'MV USD')
      ),
      h('div',{style:{textAlign:'center',minWidth:'50px'}},
        h('div',{style:{fontSize:'13px',color:'var(--text3)'}},f.equity+'E / '+f.fi+'FI')
      ),
      h('div',{style:{textAlign:'center',minWidth:'50px'}},
        excCount>0?h('span',{className:'sev sev-'+(excCount>3?'high':'medium')},excCount+' exc'):h('span',{style:{fontSize:'12px',color:'var(--emerald)'}},'✓ Clean')
      )
    );
    fundPanel.appendChild(row)
  });
  wrap.appendChild(fundPanel);

  // Consistency Rules detail
  const rulePanel=h('div',{className:'rule-table'});
  rulePanel.appendChild(h('div',{style:{padding:'16px 20px',borderBottom:'1px solid var(--border2)'}},
    h('div',{style:{fontWeight:600,fontSize:'14px',color:'#fff'}},'Consistency Rules Detail'),
    h('div',{style:{fontSize:'12px',color:'var(--text3)',marginTop:'2px'}},'6 rules evaluated across '+S.totalRecords+' positions')
  ));
  const rtbl=h('table');
  rtbl.appendChild(h('thead',null,h('tr',null,
    h('th',null,'Rule ID'),h('th',null,'Rule Name'),h('th',null,'Pass'),h('th',null,'Fail'),h('th',null,'Score'),h('th',null,'Status')
  )));
  const rtbody=h('tbody');
  DQ_RULES.forEach(r=>{
    rtbody.appendChild(h('tr',{style:{cursor:'default'}},
      h('td',null,h('span',{className:'mono',style:{color:'var(--indigo)'}},r.id)),
      h('td',null,h('span',{style:{fontWeight:500,color:'#fff'}},r.name)),
      h('td',null,h('span',{style:{color:'var(--emerald)'}},r.pass)),
      h('td',null,h('span',{style:{color:r.fail>0?'var(--red)':'var(--text3)'}},r.fail)),
      h('td',null,ring2(r.score,36,3)),
      h('td',null,r.fail===0?h('span',{style:{color:'var(--emerald)',fontSize:'12px'}},'✓ Pass'):h('span',{className:'sev sev-high'},r.fail+' failures'))
    ))
  });
  rtbl.appendChild(rtbody);
  rulePanel.appendChild(rtbl);
  wrap.appendChild(rulePanel);

  // Validity Rules
  const vPanel=h('div',{className:'rule-table',style:{marginTop:'20px'}});
  vPanel.appendChild(h('div',{style:{padding:'16px 20px',borderBottom:'1px solid var(--border2)'}},
    h('div',{style:{fontWeight:600,fontSize:'14px',color:'#fff'}},'Validity Rules Detail'),
    h('div',{style:{fontSize:'12px',color:'var(--text3)',marginTop:'2px'}},'6 format validation rules — all passing')
  ));
  const vtbl=h('table');
  vtbl.appendChild(h('thead',null,h('tr',null,
    h('th',null,'Rule ID'),h('th',null,'Rule Name'),h('th',null,'Checks'),h('th',null,'Pass'),h('th',null,'Score')
  )));
  const vtbody=h('tbody');
  DQ_VALIDITY_RULES.forEach(r=>{
    vtbody.appendChild(h('tr',{style:{cursor:'default'}},
      h('td',null,h('span',{className:'mono',style:{color:'var(--indigo)'}},r.id)),
      h('td',null,h('span',{style:{color:'#fff'}},r.name)),
      h('td',null,fmt(r.total)),
      h('td',null,h('span',{style:{color:'var(--emerald)'}},fmt(r.pass))),
      h('td',null,h('span',{style:{color:'var(--emerald)',fontSize:'12px'}},'✓ 100%'))
    ))
  });
  vtbl.appendChild(vtbody);
  vPanel.appendChild(vtbl);
  wrap.appendChild(vPanel);

  return wrap
}

// ── ANALYTICS TAB ──
function renderAnalytics(){
  const wrap=h('div');
  const grid=h('div',{className:'ag'});

  // Exceptions by Fund
  const c1=h('div',{className:'ac'});
  c1.appendChild(h('div',{className:'at'},'Exceptions by Fund'));
  FUNDS.forEach(f=>{
    const cnt=EXCEPTIONS.filter(e=>e.fund===f.name).length;
    const highCnt=EXCEPTIONS.filter(e=>e.fund===f.name&&(e.sev==='high'||e.sev==='critical')).length;
    const pct=Math.round(cnt/EXCEPTIONS.length*100);
    const row=h('div',{className:'bar-row'});
    row.appendChild(h('div',{className:'bar-lbl'},f.name.split(' ').slice(-2).join(' ')));
    const bg=h('div',{className:'bar-bg'});
    bg.appendChild(h('div',{className:'bar-fg',style:{width:pct+'%',background:highCnt>2?'var(--amber)':'var(--teal)'}}));
    bg.appendChild(h('div',{className:'bar-val'},cnt+(highCnt>0?' ('+highCnt+' high)':'')));
    row.appendChild(bg);
    c1.appendChild(row)
  });
  grid.appendChild(c1);

  // Exceptions by Rule
  const c2=h('div',{className:'ac'});
  c2.appendChild(h('div',{className:'at'},'Exceptions by DQ Rule'));
  const ruleGroups={};
  EXCEPTIONS.forEach(e=>{ruleGroups[e.rule]=(ruleGroups[e.rule]||0)+1});
  Object.entries(ruleGroups).sort((a,b)=>b[1]-a[1]).forEach(([rule,cnt])=>{
    const pct=Math.round(cnt/EXCEPTIONS.length*100);
    const ruleObj=DQ_RULES.find(r=>r.id===rule);
    const row=h('div',{className:'bar-row'});
    row.appendChild(h('div',{className:'bar-lbl'},rule+(ruleObj?' · '+ruleObj.name.substring(0,20):'')));
    const bg=h('div',{className:'bar-bg'});
    bg.appendChild(h('div',{className:'bar-fg',style:{width:pct+'%',background:rule==='CR-001'?'var(--amber)':'var(--teal)'}}));
    bg.appendChild(h('div',{className:'bar-val'},cnt));
    row.appendChild(bg);
    c2.appendChild(row)
  });
  grid.appendChild(c2);
  wrap.appendChild(grid);

  // Second row
  const grid2=h('div',{className:'ag',style:{marginTop:'20px'}});

  // Status breakdown
  const c3=h('div',{className:'ac'});
  c3.appendChild(h('div',{className:'at'},'Status Distribution'));
  const statusGroups={};
  EXCEPTIONS.forEach(e=>{statusGroups[e.status]=(statusGroups[e.status]||0)+1});
  const statusColors={Open:'var(--red)',InProgress:'var(--amber)',Escalated:'var(--fuchsia)',Resolved:'var(--emerald)',Closed:'var(--text3)'};
  Object.entries(statusGroups).forEach(([st,cnt])=>{
    const pct=Math.round(cnt/EXCEPTIONS.length*100);
    const row=h('div',{className:'bar-row'});
    row.appendChild(h('div',{className:'bar-lbl'},st==='InProgress'?'In Progress':st));
    const bg=h('div',{className:'bar-bg'});
    bg.appendChild(h('div',{className:'bar-fg',style:{width:pct+'%',background:statusColors[st]||'var(--teal)'}}));
    bg.appendChild(h('div',{className:'bar-val'},cnt+' ('+pct+'%)'));
    row.appendChild(bg);
    c3.appendChild(row)
  });
  grid2.appendChild(c3);

  // Security type breakdown
  const c4=h('div',{className:'ac'});
  c4.appendChild(h('div',{className:'at'},'Exceptions by Security Type'));
  const typeGroups={};
  EXCEPTIONS.forEach(e=>{typeGroups[e.secType]=(typeGroups[e.secType]||0)+1});
  Object.entries(typeGroups).sort((a,b)=>b[1]-a[1]).forEach(([t,cnt])=>{
    const pct=Math.round(cnt/EXCEPTIONS.length*100);
    const row=h('div',{className:'bar-row'});
    row.appendChild(h('div',{className:'bar-lbl'},t));
    const bg=h('div',{className:'bar-bg'});
    bg.appendChild(h('div',{className:'bar-fg',style:{width:pct+'%',background:t==='FIXED_INCOME'?'var(--amber)':'var(--teal)'}}));
    bg.appendChild(h('div',{className:'bar-val'},cnt+' ('+pct+'%)'));
    row.appendChild(bg);
    c4.appendChild(row)
  });
  grid2.appendChild(c4);
  wrap.appendChild(grid2);

  // Root cause panel
  const rca=h('div',{style:{marginTop:'20px',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:'12px',padding:'24px'}});
  rca.appendChild(h('div',{style:{fontWeight:600,fontSize:'14px',color:'#fff',marginBottom:'16px'}},'🔍 Root Cause Analysis'));

  const rcaItems=[
    {title:'Bond Pricing Convention (CR-001)',count:14,pct:'82%',sev:'high',
     desc:'All 14 FIXED_INCOME positions fail the MV = Qty × Price rule. Root cause: bonds are priced per 100 face value. The correct formula is MV = Face Value × Clean Price ÷ 100. The rule needs to branch on security_type.',
     fix:'Update CR-001 to use: IF security_type = FIXED_INCOME THEN MV ≈ face_value × closing_price ÷ 100 ELSE MV ≈ settled_quantity × closing_price'},
    {title:'Quantity Reconciliation Gap (CR-004)',count:3,pct:'18%',sev:'low',
     desc:'3 EQUITY positions show settled_quantity ≠ available_quantity with zero pledged and zero on-loan. Affected securities: JNJ (361 shares), NESN (353 shares), ROG (219 shares). All in Swiss or US equities.',
     fix:'Investigate pending corporate actions or settlement timing. Check if pending_buy/pending_sell quantities should offset the available balance.'}
  ];
  rcaItems.forEach(r=>{
    const item=h('div',{style:{background:'rgba(15,23,42,.5)',border:'1px solid var(--border2)',borderRadius:'10px',padding:'18px',marginBottom:'12px'}});
    item.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
        h('span',{style:{fontWeight:600,color:'#fff'}},r.title),
        h('span',{className:'sev sev-'+r.sev},r.sev)
      ),
      h('span',{style:{fontSize:'13px',color:'var(--text2)'}},r.count+' exceptions ('+r.pct+')')
    ));
    item.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text2)',lineHeight:'1.6',marginBottom:'10px'}},r.desc));
    item.appendChild(h('div',{style:{fontSize:'12px',color:'var(--teal)',background:'rgba(20,184,166,.08)',border:'1px solid rgba(20,184,166,.2)',borderRadius:'6px',padding:'10px',lineHeight:'1.5'}},
      '💡 Recommended Fix: '+r.fix
    ));
    rca.appendChild(item)
  });
  wrap.appendChild(rca);

  return wrap
}

// ── INIT ──
render();
</script>
