<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXF Exception Tracker — Data Quality Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--bg2:rgba(30,41,59,.6);--bg3:rgba(30,41,59,.4);--bg-card:#1e293b;
  --border:rgba(51,65,85,.5);--border2:rgba(51,65,85,.35);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --teal:#2dd4bf;--blue:#60a5fa;--indigo:#a5b4fc;--red:#fca5a5;
  --amber:#fcd34d;--emerald:#34d399;--fuchsia:#e879f9;--orange:#fb923c;
  --font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
body{min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
button,select,input,textarea{font-family:inherit;font-size:inherit;color:inherit;outline:none}
select option{background:#1e293b}
input::placeholder,textarea::placeholder{color:var(--text3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Header */
.header{border-bottom:1px solid var(--border);background:rgba(15,23,42,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:30}
.header-inner{max-width:1600px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#14b8a6,#06b6d4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:16px}
.header-right{display:flex;align-items:center;gap:12px}
.sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.conn-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:500}
.conn-ata{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:var(--indigo)}
.conn-jira{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:var(--blue)}
.conn-dot{width:5px;height:5px;border-radius:50%;background:var(--emerald)}
.ata-icon{width:16px;height:16px;border-radius:3px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:800}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--emerald);animation:pulse 2s infinite}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s}
.btn:hover{color:#fff;border-color:rgba(71,85,105,.7)}
.btn-blue{background:rgba(37,99,235,.8);border-color:transparent;color:#fff}.btn-blue:hover{background:rgba(37,99,235,1)}
.btn-indigo{background:rgba(79,70,229,.25);border-color:rgba(79,70,229,.4);color:var(--indigo)}.btn-indigo:hover{background:rgba(79,70,229,.35)}
.btn-teal{background:rgba(20,184,166,.8);border-color:transparent;color:#fff}.btn-teal:hover{background:rgba(20,184,166,1)}
.btn-sm{padding:4px 10px;font-size:11px}
.view-tog{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-tog button{padding:6px 12px;font-size:12px;background:transparent;border:none;color:var(--text3);cursor:pointer;transition:all .15s}
.view-tog button.active{background:rgba(20,184,166,.2);color:var(--teal)}

/* Main */
.main{max-width:1600px;margin:0 auto;padding:24px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color .15s}
.stat:hover{border-color:rgba(71,85,105,.6)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.stat-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.stat-icon{font-size:16px}
.stat-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* Tabs */
.tab-nav{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:4px;margin-bottom:20px}
.tab-nav button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;background:transparent;border:none;color:var(--text3);cursor:pointer;transition:all .15s}
.tab-nav button.active{background:rgba(51,65,85,.7);color:#fff}
.tab-nav button:hover:not(.active){color:var(--text)}

/* Filters */
.filter-bar{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:20px;display:flex;flex-wrap:wrap;align-items:center;gap:12px}
.f-input{background:rgba(51,65,85,.35);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;width:250px;transition:border-color .15s}
.f-input:focus{border-color:rgba(20,184,166,.5)}
.f-select{background:rgba(51,65,85,.35);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:#fff;font-size:12px;cursor:pointer}

/* Badges */
.sev{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.sev-critical{background:rgba(127,29,29,.3);color:var(--red);border:1px solid rgba(185,28,28,.5)}
.sev-high{background:rgba(120,53,15,.3);color:var(--amber);border:1px solid rgba(180,83,9,.5)}
.sev-medium{background:rgba(12,74,110,.3);color:#7dd3fc;border:1px solid rgba(14,116,144,.5)}
.sev-low{background:rgba(51,65,85,.4);color:var(--text2);border:1px solid rgba(71,85,105,.5)}
.sts{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500}
.sts-Open{background:rgba(239,68,68,.15);color:var(--red)}
.sts-InProgress{background:rgba(245,158,11,.15);color:var(--amber)}
.sts-Escalated{background:rgba(217,70,239,.15);color:var(--fuchsia)}
.sts-Resolved{background:rgba(16,185,129,.15);color:var(--emerald)}
.sts-Closed{background:rgba(100,116,139,.15);color:var(--text3)}

/* Table */
.tbl-wrap{background:rgba(30,41,59,.3);border:1px solid var(--border2);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:rgba(15,23,42,.85)}
th.sort{cursor:pointer;user-select:none}
th.sort:hover{color:var(--text)}
td{padding:10px 12px;border-bottom:1px solid rgba(51,65,85,.25);vertical-align:middle}
tbody tr{transition:background .1s;cursor:pointer;animation:fadeIn .2s ease-out}
tbody tr:hover{background:rgba(51,65,85,.12)}
.int-tag{display:inline-block;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:500}
.tag-j{background:rgba(59,130,246,.15);color:var(--blue)}
.tag-a{background:rgba(99,102,241,.15);color:var(--indigo)}

/* Board */
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.bcol{background:rgba(30,41,59,.3);border:1px solid var(--border2);border-radius:12px;overflow:hidden}
.bcol-head{padding:12px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px}
.bcol-body{padding:8px;min-height:180px;max-height:600px;overflow-y:auto}
.bcard{background:rgba(30,41,59,.6);border:1px solid var(--border2);border-radius:8px;padding:12px;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
.bcard:hover{border-color:rgba(71,85,105,.6)}

/* DQ Ring */
.dqr{position:relative;display:inline-flex;align-items:center;justify-content:center}
.dqr svg{transform:rotate(-90deg)}
.dqr-txt{position:absolute;font-weight:700;font-variant-numeric:tabular-nums}

/* DQ Panel */
.ata-panel{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:20px}
.ata-panel-head{padding:16px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.ata-row{padding:14px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(51,65,85,.25);transition:background .1s;cursor:pointer}
.ata-row:last-child{border-bottom:none}
.ata-row:hover{background:rgba(51,65,85,.1)}
.ata-expand{padding:4px 20px 16px;animation:fadeIn .2s ease-out}
.dim-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}
.dim-card{background:rgba(15,23,42,.4);border:1px solid rgba(51,65,85,.3);border-radius:8px;padding:10px;text-align:center}
.dim-bar{margin-top:6px;height:4px;background:rgba(51,65,85,.4);border-radius:2px;overflow:hidden}
.dim-fill{height:100%;border-radius:2px;transition:width .7s}

/* Modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg-card);border:1px solid rgba(71,85,105,.5);border-radius:12px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.4)}
.modal-sm{max-width:500px}.modal-lg{max-width:640px}
.modal-hd{padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-bd{padding:24px;display:flex;flex-direction:column;gap:18px}
.modal-ft{padding:24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px}
.xbtn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px}.xbtn:hover{color:#fff}
.flbl{display:block;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:6px}
.fld{width:100%;background:rgba(51,65,85,.35);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:#fff}
.fld:focus{border-color:rgba(99,102,241,.5)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.info-bx{border-radius:8px;padding:12px;font-size:11px}
.info-ind{background:rgba(49,46,129,.2);border:1px solid rgba(67,56,202,.3);color:var(--indigo)}
.info-amb{background:rgba(120,53,15,.2);border:1px solid rgba(180,83,9,.3);color:var(--amber)}
.radio-opt{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:8px;border:1px solid rgba(51,65,85,.3);background:rgba(15,23,42,.2);cursor:pointer;transition:all .15s}
.radio-opt.sel{background:rgba(49,46,129,.2);border-color:rgba(79,70,229,.4)}
.radio-opt input{margin-top:2px;accent-color:#6366f1}
.cfg-tabs{display:flex;gap:4px;background:rgba(15,23,42,.5);border-radius:8px;padding:4px;margin-top:12px}
.cfg-tabs button{flex:1;padding:6px;border-radius:6px;font-size:11px;font-weight:500;background:transparent;border:none;color:var(--text3);cursor:pointer}
.cfg-tabs button.active{background:rgba(51,65,85,.7);color:#fff}
.tog{width:40px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:#4f46e5}.tog.off{background:#475569}
.tog-th{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:transform .2s}
.tog.on .tog-th{transform:translateX(22px)}.tog.off .tog-th{transform:translateX(2px)}

/* Slideover */
.so-bg{position:fixed;inset:0;z-index:40;display:flex;justify-content:flex-end}
.so-dim{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.so{position:relative;background:var(--bg-card);border-left:1px solid var(--border);width:100%;max-width:520px;overflow-y:auto;box-shadow:-20px 0 40px rgba(0,0,0,.3);animation:slideIn .2s ease-out}
.so-head{position:sticky;top:0;background:rgba(30,41,59,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:20px;z-index:10}
.so-body{padding:20px;display:flex;flex-direction:column;gap:24px}
.ata-info{background:rgba(49,46,129,.1);border:1px solid rgba(67,56,202,.25);border-radius:12px;padding:16px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mlbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.mval{color:#fff;font-size:13px;margin-top:2px}
.cmt{display:flex;gap:12px;margin-bottom:12px}
.cmt-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.cmt-sys{background:rgba(51,65,85,.7);color:var(--text3)}
.cmt-ata{background:rgba(67,56,202,.4);color:var(--indigo)}
.cmt-usr{background:rgba(20,184,166,.3);color:var(--teal)}

/* Analytics */
.ana-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ana-card{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:20px}
.ana-title{font-weight:600;font-size:13px;margin-bottom:16px;color:#fff}
.bar-r{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-l{font-size:11px;color:var(--text2);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-t{flex:1;height:16px;background:rgba(51,65,85,.3);border-radius:99px;overflow:hidden;position:relative}
.bar-f{height:100%;border-radius:99px;background:linear-gradient(90deg,#0d9488,#06b6d4);transition:width .5s}
.bar-v{font-size:11px;font-weight:700;width:24px;text-align:right;font-variant-numeric:tabular-nums;color:#fff}
.cat-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-c{border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:500}
.cat-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.prg{margin-bottom:14px}
.prg-top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.prg-trk{height:8px;background:rgba(51,65,85,.4);border-radius:99px;overflow:hidden}
.prg-fill{height:100%;border-radius:99px;transition:width .5s}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4f46e5;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;z-index:60;box-shadow:0 20px 40px rgba(0,0,0,.3);animation:toastIn .3s ease-out}
.hidden{display:none!important}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(3,1fr)}.board{grid-template-columns:repeat(3,1fr)}.dim-grid{grid-template-columns:repeat(3,1fr)}.ana-grid{grid-template-columns:1fr}}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:1fr}.dim-grid{grid-template-columns:repeat(2,1fr)}.header-inner{flex-wrap:wrap;gap:10px}}
</style>
</head>

<div id="app"></div>

// ── Helpers ──
function h(tag, attrs, ...ch) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  ch.flat(9).forEach(c => { if (c != null && c !== false) el.append(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c); });
  return el;
}

function timeAgo(d) {
  const m = Math.floor((Date.now()-new Date(d).getTime())/60000);
  if (m < 60) return m+'m ago';
  const hr = Math.floor(m/60);
  if (hr < 24) return hr+'h ago';
  return Math.floor(hr/24)+'d ago';
}
function fmtDate(d) { return new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function dqCol(s) { return s>=95?'var(--emerald)':s>=85?'var(--amber)':s>=70?'var(--orange)':'var(--red)'; }
function dqBg(s) { return s>=95?'#34d399':s>=85?'#fbbf24':s>=70?'#fb923c':'#f87171'; }
function stsClass(s) { return 'sts sts-'+s.replace(/ /g,''); }
function sevClass(s) { return 'sev sev-'+s; }

function dqRing(score, size=36, sw=3.5) {
  const r=(size-sw)/2, circ=2*Math.PI*r, off=circ-(score/100)*circ;
  const col = score>=95?'#34d399':score>=85?'#fbbf24':score>=70?'#fb923c':'#f87171';
  const fs = size < 40 ? 9 : 11;
  return h('div',{className:'dqr',style:{width:size+'px',height:size+'px'}},
    h('svg',{innerHTML:`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#334155" stroke-width="${sw}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:all .7s"/>`,style:{width:size+'px',height:size+'px',transform:'rotate(-90deg)'}}),
    h('span',{className:'dqr-txt',style:{fontSize:fs+'px',color:col}}, score > 0 ? Math.round(score) : '—')
  );
}

function toast(msg) {
  state.toastMsg = msg;
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => { state.toastMsg = null; render(); }, 3500);
  render();
}

function getFiltered() {
  const f = state.filters;
  return exceptions.filter(e => {
    if (f.severity!=='all' && e.severity!==f.severity) return false;
    if (f.status!=='all' && e.status!==f.status) return false;
    if (f.source!=='all' && e.source!==f.source) return false;
    if (f.category!=='all' && e.category!==f.category) return false;
    if (f.search && !(e.id+' '+e.title+' '+e.desc+' '+e.fund+' '+(e.ataRef||'')+' '+(e.ataRule||'')).toLowerCase().includes(f.search.toLowerCase())) return false;
    return true;
  }).sort((a,b) => {
    const d = state.sortDir==='asc'?1:-1;
    if (state.sortBy==='severity') { const o={critical:0,high:1,medium:2,low:3}; return (o[a.severity]-o[b.severity])*d; }
    if (state.sortBy==='dqScore') return ((a.ataDQ||100)-(b.ataDQ||100))*d;
    return (new Date(a[state.sortBy])-new Date(b[state.sortBy]))*d;
  });
}

function getStats() {
  const act = exceptions.filter(e=>e.status!=='Closed'&&e.status!=='Resolved');
  const scored = exceptions.filter(e=>e.ataDQ!=null&&e.status!=='Closed');
  return {
    total: exceptions.length,
    open: exceptions.filter(e=>e.status==='Open').length,
    critical: exceptions.filter(e=>e.severity==='critical'&&e.status!=='Closed'&&e.status!=='Resolved').length,
    escalated: exceptions.filter(e=>e.status==='Escalated').length,
    jira: exceptions.filter(e=>e.jiraKey).length,
    ata: exceptions.filter(e=>e.ataRef).length,
    unassigned: act.filter(e=>!e.assignee).length,
    records: act.reduce((s,e)=>s+e.records,0),
    avgDQ: scored.length ? (scored.reduce((s,e)=>s+e.ataDQ,0)/scored.length).toFixed(1) : '—'
  };
}

function renderAnalytics() {
  const st = getStats();
  // By source
  const srcCard = h('div',{className:'ana-card'},h('div',{className:'ana-title'},'Exceptions by Source'));
  const srcCounts = SOURCES.map(s=>({name:s,count:exceptions.filter(e=>e.source===s&&e.status!=='Closed').length,crit:exceptions.filter(e=>e.source===s&&e.severity==='critical'&&e.status!=='Closed').length}));
  const maxC = Math.max(...srcCounts.map(x=>x.count),1);
  srcCounts.forEach(({name,count,crit})=>{
    srcCard.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}},
      h('span',{style:{fontSize:'11px',color:'var(--text2)',width:'130px',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},name),
      h('div',{style:{flex:1,height:'16px',background:'rgba(51,65,85,.3)',borderRadius:'99px',overflow:'hidden',position:'relative'}},
        h('div',{style:{height:'100%',borderRadius:'99px',background:'linear-gradient(90deg,#0d9488,#06b6d4)',width:(count/maxC*100)+'%',transition:'width .5s'}}),
        crit>0?h('div',{style:{position:'absolute',right:'8px',top:0,height:'100%',display:'flex',alignItems:'center'}},h('span',{style:{color:'var(--red)',fontSize:'10px',fontWeight:700}},crit+' crit')):null
      ),
      h('span',{style:{fontSize:'11px',fontWeight:700,width:'24px',textAlign:'right',fontVariantNumeric:'tabular-nums',color:'#fff'}},count)
    ));
  });

  // By category
  const catCard = h('div',{className:'ana-card'},h('div',{className:'ana-title'},'Exceptions by DQ Dimension'),h('div',{className:'cat-g'}));
  CATEGORIES.forEach((cat,i)=>{
    const c = exceptions.filter(e=>e.category===cat&&e.status!=='Closed').length;
    const cc = CAT_COLORS[i];
    catCard.lastChild.appendChild(h('div',{className:'cat-c',style:{background:cc.bg,color:cc.c,border:'1px solid '+cc.bd}},
      h('span',{},cat),h('span',{className:'cat-v'},c)
    ));
  });

  // Integration coverage
  const intCard = h('div',{className:'ana-card'},h('div',{className:'ana-title'},'Integration Coverage'));
  const both = exceptions.filter(e=>e.jiraKey&&e.ataRef).length;
  const none = exceptions.filter(e=>!e.jiraKey&&!e.ataRef).length;
  [['DQ Engine Linked',st.ata,st.total,'linear-gradient(90deg,#6366f1,#8b5cf6)'],
   ['JIRA Tickets Created',st.jira,st.total,'linear-gradient(90deg,#3b82f6,#2563eb)'],
   ['Fully Tracked (Both)',both,st.total,'linear-gradient(90deg,#10b981,#14b8a6)'],
   ['Unlinked Exceptions',none,st.total,'linear-gradient(90deg,#ef4444,#f43f5e)']
  ].forEach(([label,val,tot,grad])=>{
    intCard.appendChild(h('div',{className:'prg'},
      h('div',{className:'prg-top'},h('span',{style:{color:'var(--text2)'}},label),h('span',{style:{color:'#fff',fontWeight:700}},val+' / '+tot)),
      h('div',{className:'prg-trk'},h('div',{className:'prg-fill',style:{width:(val/tot*100)+'%',background:grad}}))
    ));
  });

  // DQ scores by source
  const dqCard = h('div',{className:'ana-card'},h('div',{className:'ana-title'},'DQ Scores by Source (Open Issues)'));
  SOURCES.forEach(src=>{
    const iss = exceptions.filter(e=>e.source===src&&e.ataDQ!=null&&e.status!=='Closed'&&e.status!=='Resolved');
    const avg = iss.length ? iss.reduce((s,e)=>s+e.ataDQ,0)/iss.length : null;
    dqCard.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}},
      h('span',{style:{fontSize:'11px',color:'var(--text2)',width:'130px',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},src),
      avg!=null ? h('div',{style:{flex:1,height:'10px',background:'rgba(51,65,85,.3)',borderRadius:'99px',overflow:'hidden'}},
        h('div',{style:{height:'100%',borderRadius:'99px',background:dqBg(avg),width:avg+'%',transition:'width .5s'}})
      ) : null,
      avg!=null ? h('span',{style:{fontSize:'11px',fontWeight:700,width:'48px',textAlign:'right',fontVariantNumeric:'tabular-nums',color:dqCol(avg)}},avg.toFixed(1)+'%') : h('span',{style:{color:'var(--text3)',fontSize:'11px'}},'No data')
    ));
  });

  return h('div',{className:'ana-grid'},srcCard,catCard,intCard,dqCard);
}

          ),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}},
            h('div',{style:{textAlign:'center'}},dqRing(e.ataDQ,48,4),h('div',{style:{color:'var(--text3)',fontSize:'11px',marginTop:'4px'}},'DQ Score')),
            h('div',{},
              h('span',{style:{color:'var(--text3)',fontSize:'10px'}},'Rule ID'),
              h('div',{style:{color:'var(--indigo)',fontFamily:'var(--mono)',fontSize:'12px',marginTop:'2px'}},e.ataRule),
              h('span',{style:{color:'var(--text3)',fontSize:'10px',marginTop:'8px',display:'block'}},'Issue Ref'),
              h('div',{style:{color:'var(--indigo)',fontFamily:'var(--mono)',fontSize:'12px',marginTop:'2px'}},e.ataRef)
            ),
            h('div',{},
              h('span',{style:{color:'var(--text3)',fontSize:'10px'}},'Dimension'),
              h('div',{style:{color:'#fff',fontSize:'12px',marginTop:'2px'}},e.category),
              h('span',{style:{color:'var(--text3)',fontSize:'10px',marginTop:'8px',display:'block'}},'Catalog Item'),
              h('div',{style:{color:'#fff',fontSize:'12px',marginTop:'2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ataIss?ataIss.cat:'—')
            )
          ),
          h('div',{style:{display:'flex',gap:'8px',marginTop:'12px'}},
            h('button',{className:'btn btn-indigo btn-sm',style:{flex:1,justifyContent:'center'},onClick:()=>{state.ataSyncId=e.id;render();}},'Sync DQ Status'),
            h('a',{href:'#',style:{fontSize:'11px',color:'var(--indigo)',padding:'4px 10px',display:'flex',alignItems:'center'}},'Open in DQ Portal ↗')
          )
        ) : null,

        // Metadata
        h('div',{className:'mgrid'},
          ...['Source','Category','Fund','Assignee','Impacted Records','Created','Last Updated'].map((lbl,i)=>{
            const vals=[e.source,e.category,e.fund,e.assignee||'Unassigned',e.records,fmtDate(e.created),fmtDate(e.updated)];
            return h('div',{},h('span',{className:'mlbl'},lbl),h('div',{className:'mval'},vals[i]));
          })
        ),

        // Description
        h('div',{},
          h('div',{style:{fontSize:'10px',fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--text3)',marginBottom:'8px'}},'Description'),
          h('div',{style:{color:'var(--text)',fontSize:'13px',lineHeight:1.5,background:'rgba(15,23,42,.4)',border:'1px solid rgba(51,65,85,.3)',borderRadius:'8px',padding:'12px'}},e.desc)
        ),

        // Actions
        h('div',{},
          h('div',{style:{fontSize:'10px',fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--text3)',marginBottom:'8px'}},'Actions'),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px'}},
            e.status!=='Closed'&&e.status!=='Resolved' ? (()=>{
              const sel=h('select',{className:'f-select',style:{fontSize:'11px',padding:'4px 8px'}});
              sel.innerHTML='<option value="" disabled selected>Change Status...</option>'+STATUSES.filter(s=>s!==e.status).map(s=>'<option value="'+s+'">'+s+'</option>').join('');
              sel.addEventListener('change',ev=>{if(ev.target.value){e.status=ev.target.value;e.updated=new Date().toISOString();e.comments.push({u:'J. Koerber',t:'Status changed to '+ev.target.value,ts:new Date().toISOString()});render();}});
              return sel;
            })() : null,
            e.status!=='Closed'&&e.status!=='Resolved'&&!e.jiraKey ? h('button',{className:'btn btn-sm',style:{fontSize:'11px'},onClick:()=>{state.jiraModalId=e.id;render();}},'Create JIRA Issue') : null,
            e.jiraKey?h('span',{style:{fontSize:'11px',color:'var(--text3)',padding:'4px 8px',display:'flex',alignItems:'center'}},'→ '+e.jiraKey):null
          )
        ),

        // Activity
        h('div',{},
          h('div',{style:{fontSize:'10px',fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--text3)',marginBottom:'12px'}},'Activity Log ('+e.comments.length+')'),
          ...e.comments.map(c=>
            h('div',{className:'cmt'},
              h('div',{className:'cmt-av '+(c.u==='System'?'cmt-sys':c.u==='DQ Engine'?'cmt-ata':'cmt-usr')},
                c.u==='System'?'⚙':c.u==='DQ Engine'?'DQ':c.u[0]
              ),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                  h('span',{style:{color:'#fff',fontSize:'11px',fontWeight:500}},c.u),
                  h('span',{style:{color:'var(--text3)',fontSize:'11px'}},timeAgo(c.ts))
                ),
                h('div',{style:{color:'var(--text2)',fontSize:'12px',marginTop:'3px'}},c.t)
              )
            )
          ),
          (()=>{
            const inp=h('input',{className:'fld',style:{flex:1},placeholder:'Add a comment...'});
            const post=()=>{
              if(inp.value.trim()){
                e.comments.push({u:'J. Koerber',t:inp.value.trim(),ts:new Date().toISOString()});
                e.updated=new Date().toISOString();
                render();
              }
            };
            inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')post();});
            return h('div',{style:{display:'flex',gap:'8px',marginTop:'4px'}},
              inp,
              h('button',{className:'btn btn-teal btn-sm',onClick:post},'Post')
            );
          })()
        )
      )
    )
  );
  return el;
}

// ── Import Issues ──
function importIssues(projId) {
  const existing = new Set(exceptions.map(e=>e.ataRef));
  const newIss = ATA_ISSUES.filter(i=>i.proj===projId&&!existing.has(i.id));
  if(!newIss.length){toast('All issues already imported');return;}
  newIss.forEach((iss,idx)=>{
    exceptions.push({
      id:'DQE-'+(1011+exceptions.length+idx),
      title:iss.rule+': '+iss.desc.slice(0,60)+'...',
      category:iss.dim,source:iss.src,severity:iss.sev,
      status:iss.st==='open'?'Open':iss.st==='in_progress'?'In Progress':iss.st==='escalated'?'Escalated':iss.st==='resolved'?'Resolved':'Closed',
      assignee:null,created:iss.det,updated:new Date().toISOString(),fund:'—',
      jiraKey:null,ataRef:iss.id,ataDQ:iss.dq,ataRule:iss.ruleId,
      desc:iss.desc,records:iss.fail,
      comments:[
        {u:'DQ Engine',t:'DQ rule '+iss.ruleId+' ('+iss.rule+') — '+iss.fail+'/'+iss.tot+' records failed. Score: '+iss.dq+'%',ts:iss.det},
        {u:'System',t:'Imported from DQ monitoring project: '+(PROJECTS.find(p=>p.id===projId)||{}).name,ts:new Date().toISOString()}
      ]
    });
  });
  toast('Imported '+newIss.length+' issues from DQ Engine');
}

// ── Main Render ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderHeader());
  const main = h('div',{style:{maxWidth:'1600px',margin:'0 auto',padding:'24px'}});
  main.appendChild(renderStats());
  main.appendChild(renderTabNav());

  if(state.activeTab==='exceptions'){
    main.appendChild(renderFilters());
    main.appendChild(state.view==='table'?renderTable():renderBoard());
  } else if(state.activeTab==='monitoring'){
    main.appendChild(renderMonitoring());
  } else {
    main.appendChild(renderAnalytics());
  }
  app.appendChild(main);

  // Overlays
  if(state.selectedId) app.appendChild(renderDetail());
  const jm = renderJiraModal(); if(jm) app.appendChild(jm);
  const am = renderAtaSyncModal(); if(am) app.appendChild(am);
  const cm = renderConfigModal(); if(cm) app.appendChild(cm);
  if(state.toastMsg) app.appendChild(h('div',{className:'toast'},h('span',{style:{fontSize:'16px'}},'✓'),state.toastMsg));
}

render();
</script>
